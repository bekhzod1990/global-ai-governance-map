name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Validate data
        run: npm run validate:data

      - name: Validate dataset export
        run: npm run validate:export

      - name: Audit source metadata
        run: npm run audit:sources -- --output=source-audit-report.md --json-output=source-audit-report.json --fail-on-metadata-warnings

      - name: Audit source links (warning-only)
        run: npm run audit:source-links -- --output=source-link-audit-report.md --json-output=source-link-audit-report.json

      - name: Upload source audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-audit-report
          path: |
            source-audit-report.md
            source-audit-report.json
            source-link-audit-report.md
            source-link-audit-report.json

      - name: Build editorial data review report
        run: npm run audit:data-review -- --output=data-review-report.md --json-output=data-review-report.json

      - name: Upload editorial data review report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: data-review-report
          path: |
            data-review-report.md
            data-review-report.json

      - name: Build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: End-to-end and accessibility tests
        run: npm run test:e2e

      - name: Audit production dependencies
        run: npm audit --omit=dev
